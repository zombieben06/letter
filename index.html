<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Happy 8/3 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      background: #fff0f3;
      overflow: hidden;
    }

    /* Polka dot background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #ffc2ce 1.5px, transparent 1.5px);
      background-size: 28px 28px;
      opacity: 0.5;
      z-index: 0;
    }

    /* Floating hearts */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .heart-float {
      position: absolute;
      bottom: -40px;
      font-size: 1.4rem;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-10deg); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-105vh) rotate(10deg); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 2;
      background: white;
      border-radius: 32px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 12px 48px rgba(233, 77, 88, 0.15), 0 2px 8px rgba(233,77,88,0.08);
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    .emoji-top {
      font-size: 3.5rem;
      margin-bottom: 0.5rem;
      display: block;
      animation: wiggle 2s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%,100% { transform: rotate(-5deg); }
      50%      { transform: rotate(5deg); }
    }

    .date-tag {
      display: inline-block;
      background: #ffe0e6;
      color: #e94d58;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 2.4rem;
      color: #e94d58;
      line-height: 1.2;
      margin-bottom: 0.8rem;
    }

    .message {
      font-size: 0.95rem;
      color: #a07080;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #ff6b81, #e94d58);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      border: none;
      border-radius: 50px;
      padding: 0.75rem 2rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(233,77,88,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .enter-btn:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 8px 24px rgba(233,77,88,0.4);
    }

    .enter-btn:active {
      transform: scale(0.97);
    }

    .flowers-row {
      margin-top: 1.5rem;
      font-size: 1.4rem;
      letter-spacing: 0.3rem;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }

    /* Page out transition */
    body.fade-out {
      animation: fadeOut 0.5s ease forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: scale(1.03); }
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>

  <div class="card">
    <span class="emoji-top">💐</span>
    <img src="man.jpg" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid #ffb3c1;margin-bottom:0.8rem;" />
    <div class="date-tag">8 tháng 3 · Happy Women's Day</div>
    <h1>Chúc Mấn 8/3 zui zẻ nhaaaaa</h1>
    <p class="message">
      Có một tin nhắn nhỏ đang chờ Mấn phía sau... 🥰<br>
    </p>
    <button class="enter-btn" onclick="goNext()">
      Xem ngay 💌
    </button>
    <div class="flowers-row">🌸 🌷 🌹 🌺 🌸</div>
  </div>

  <script>
    // Spawn floating hearts
    const bg = document.getElementById('heartsBg');
    const emojis = ['🩷','💕','🌸','💗','🌷','✨','💖','🌺'];
    function spawnHeart() {
      const el = document.createElement('div');
      el.className = 'heart-float';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      const dur = 5 + Math.random() * 6;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = Math.random() * 2 + 's';
      el.style.fontSize = (0.9 + Math.random() * 1) + 'rem';
      bg.appendChild(el);
      setTimeout(() => el.remove(), (dur + 2) * 1000);
    }
    setInterval(spawnHeart, 600);
    // Seed a few right away
    for (let i = 0; i < 10; i++) spawnHeart();

    function goNext() {
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = 'letter.html'; }, 480);
    }
  </script>
</body>
</html>
